<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wildlife Lens — AI Photo Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <header>
    <div class="logo">
      <span class="logo-dot"></span>
      Wildlife Lens
    </div>
    <nav class="header-nav">
      <a href="/history" class="nav-link">History</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-eyebrow">AI Photo Analyzer</div>
      <h1>Analyze your<br>wildlife photo</h1>
      <p class="hero-sub">Upload a photo and get instant professional editing suggestions for Lightroom & Snapseed.</p>
    </section>

    <form id="upload-form" action="/analyze" method="POST" enctype="multipart/form-data">
      <div class="drop-zone" id="drop-zone">
        <div class="drop-icon">&#8679;</div>
        <p class="drop-title">Drop your photo here</p>
        <p class="drop-sub">JPG · PNG · WEBP &nbsp;·&nbsp; up to 16MB</p>
        <input type="file" name="image" id="file-input" accept=".jpg,.jpeg,.png,.webp" hidden />
      </div>

      <div class="preview-wrap" id="preview-wrap" style="display:none">
        <img id="preview-img" src="" alt="Preview" />
        <div class="preview-info">
          <span id="preview-name"></span>
          <button type="button" id="change-btn">Change photo</button>
        </div>
      </div>

      <button type="submit" class="analyze-btn" id="analyze-btn" disabled>
        Analyze Photo
      </button>
    </form>
  </main>

  <div id="loading-overlay">
    <div class="loading-ring"></div>
    <p class="loading-text">Analyzing photo&hellip;</p>
  </div>

  <script src="/static/js/script.js"></script>
</body>
</html>
